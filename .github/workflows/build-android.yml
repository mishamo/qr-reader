name: Build Flutter Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.35.1'
        channel: 'stable'
    
    - name: Create google-services.json
      env:
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      run: |
        cat > android/app/google-services.json << EOF
        {
          "project_info": {
            "project_number": "65444604303",
            "project_id": "qr-scanner-conference",
            "storage_bucket": "qr-scanner-conference.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:65444604303:android:qrscanner",
                "android_client_info": {
                  "package_name": "com.mishamo.qr_scanner"
                }
              },
              "oauth_client": [
                {
                  "client_id": "$GOOGLE_CLIENT_ID",
                  "client_type": 1,
                  "android_info": {
                    "package_name": "com.mishamo.qr_scanner",
                    "certificate_hash": ""
                  }
                }
              ],
              "api_key": [
                {
                  "current_key": "AIzaSy-placeholder"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        EOF
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: qr-scanner-release
        path: build/app/outputs/flutter-apk/app-release.apk
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: build/app/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}