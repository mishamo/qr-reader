<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - Authorization</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        .code-box {
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 1rem;
            margin: 1.5rem 0;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #333;
            cursor: pointer;
            transition: background 0.3s;
        }
        .code-box:hover {
            background: #e8e8e8;
        }
        .success {
            color: #4caf50;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .error {
            color: #f44336;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .instructions {
            color: #666;
            margin-top: 1.5rem;
            line-height: 1.6;
        }
        .copy-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }
        .copy-button:hover {
            background: #5a67d8;
        }
        .copied {
            background: #4caf50;
        }
        .step {
            background: #f9f9f9;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 6px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content"></div>
    </div>
    
    <script>
        function getParameterByName(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }
        
        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    const button = document.getElementById('copyButton');
                    button.textContent = '✓ Copied!';
                    button.classList.add('copied');
                    setTimeout(() => {
                        button.textContent = 'Copy Code';
                        button.classList.remove('copied');
                    }, 2000);
                }).catch(() => {
                    fallbackCopyToClipboard(text);
                });
            } else {
                fallbackCopyToClipboard(text);
            }
        }
        
        function fallbackCopyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '0';
            textarea.style.left = '0';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            
            try {
                document.execCommand('copy');
                const button = document.getElementById('copyButton');
                button.textContent = '✓ Copied!';
                button.classList.add('copied');
                setTimeout(() => {
                    button.textContent = 'Copy Code';
                    button.classList.remove('copied');
                }, 2000);
            } catch (err) {
                alert('Failed to copy. Please select the code manually and copy it.');
            }
            
            document.body.removeChild(textarea);
        }
        
        const code = getParameterByName('code');
        const error = getParameterByName('error');
        const errorDescription = getParameterByName('error_description');
        
        const contentDiv = document.getElementById('content');
        
        if (code) {
            contentDiv.innerHTML = `
                <div class="success">✅</div>
                <h1>Authorization Successful!</h1>
                <p>Copy this authorization code:</p>
                <div class="code-box" onclick="copyToClipboard('${code}')" title="Click to copy">
                    ${code}
                </div>
                <button id="copyButton" class="copy-button" onclick="copyToClipboard('${code}')">
                    Copy Code
                </button>
                <div class="instructions">
                    <h3>Next Steps:</h3>
                    <div class="step">1. Copy the code above</div>
                    <div class="step">2. Return to the QR Scanner app</div>
                    <div class="step">3. Paste the code when prompted</div>
                </div>
            `;
        } else if (error) {
            contentDiv.innerHTML = `
                <div class="error">❌</div>
                <h1>Authorization Failed</h1>
                <p style="color: #f44336;">Error: ${error}</p>
                ${errorDescription ? `<p style="color: #666;">${errorDescription}</p>` : ''}
                <div class="instructions">
                    <p>Please return to the QR Scanner app and try again.</p>
                    <p>If the problem persists, make sure you:</p>
                    <div class="step">• Are signed in to the correct Google account</div>
                    <div class="step">• Have granted the necessary permissions</div>
                </div>
            `;
        } else {
            contentDiv.innerHTML = `
                <div class="error">⚠️</div>
                <h1>Invalid Request</h1>
                <p>No authorization code or error was received.</p>
                <div class="instructions">
                    <p>This page should only be accessed through the Google OAuth flow.</p>
                    <p>Please return to the QR Scanner app and try signing in again.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
